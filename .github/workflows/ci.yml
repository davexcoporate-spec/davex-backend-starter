name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://davex:davex@localhost:5432/davex_client"
      JWT_SECRET: "ci-secret"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run build

      - run: npm test
